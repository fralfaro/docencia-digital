project:
  type: book
  output-dir: docs

book:
  title: "Docencia Digital"
  subtitle: "Ecosistema digital para el académico del siglo XXI"
  author: "Francisco Alfaro"
  date: "06/01/2026"
  favicon: "assets/img/brand/brand__usm.png"
  repo-url: "https://github.com/fralfaro/docencia-digital"

  chapters:
    - index.qmd
    - part: "🟪 Introducción"
      chapters:
        - 00_intro/index.qmd
    - part: "🟩 GitHub"
      chapters:
        - 01_github/01_esencial.qmd
        - 01_github/02_colaborativo.qmd
        - 01_github/03_automatizacion.qmd
    - part: "🟧 Google Colab"
      chapters:
        - 02_colab/colab_01_esencial.qmd
        - 02_colab/colab_02_pandas.qmd
        - 02_colab/colab_03_visualizacion.qmd
    - part: "🟥 LaTeX"
      chapters:
        - 03_latex/overleaf_01_esencial.qmd
        - 03_latex/overleaf_02_matematica.qmd
        - 03_latex/overleaf_03_plantillas.qmd
    - part: "🟦 Quarto"
      chapters:
        - 04_quarto/quarto_01_intro.qmd
        - 04_quarto/quarto_02_documentos.qmd
        - 04_quarto/quarto_03_revealjs.qmd
        - 04_quarto/quarto_04_sitios.qmd
        - 04_quarto/quarto_05_pages.qmd
        - 04_quarto/quarto_06_flujo.qmd
    - part: "🤖 IA"
      chapters:
        - 05_ia/ia_01_panorama.qmd
        - 05_ia/ia_02_prompting.qmd
        - 05_ia/ia_03_notebooklm.qmd
        - 05_ia/ia_04_pedagogico.qmd
        - 05_ia/ia_05_rag.qmd
        - 05_ia/ia_06_agentes.qmd
        - 05_ia/ia_07_copilot_studio.qmd
        - 05_ia/ia_08_etica.qmd

lang: es

format:
  html:
    theme:
      light: [flatly, light.scss]
      dark: [darkly, dark.scss]
    number-sections: false
    toc: false
    page-layout: full