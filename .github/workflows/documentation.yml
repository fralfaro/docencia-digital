on:
  workflow_dispatch:
  push:
    branches: [main]

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- NUEVO PASO: INSTALACIÓN DE DEPENDENCIAS DE PYTHON ---
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter PyYAML
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      # ---------------------------------------------------------

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: r-

      - name: Install system dependencies
        run: sudo apt-get install -y libxml2-dev libcurl4-openssl-dev libssl-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("knitr", "rmarkdown", "ggplot2", "dplyr", "tidyr", "kableExtra", "scales", "e1071", "gridExtra"), repos="https://cloud.r-project.org")'

      - name: Render book
        run: quarto render

      - name: Render slides
        run: python render_slides.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs